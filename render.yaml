databases:
  - name: todo-db
    databaseName: todoapp
    user: todoapp_user
    plan: free

services:
  - type: web
    name: be-todo
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://fe-todo-f4bi.onrender.com

  - type: web
    name: fe-todo
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://be-todo-cqo5.onrender.com